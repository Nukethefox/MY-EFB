<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MY EFB</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body class="app-shell">
  <main class="landing">
    <section class="card card-centered">
      <h1 class="title">MY EFB</h1>
      <form id="username-form" class="username-form">
        <label for="username-input" class="field-label">Enter your SimBrief Username to see a detailed, yet easy-to-understand, breakdown of your latest flight plan.</label>
        <input id="username-input" name="username" type="text" autocomplete="off" spellcheck="false" required>
        <button type="submit">Apply</button>
      </form>
      <p id="form-status" class="status"></p>
    </section>
  </main>
</body>
</html>
